<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maira's Weekly Meal Plan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bubblegum+Sans&family=Nunito:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    /* ===== RESET & BASE ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-primary: #FFF8F0;
      --bg-card: #FFFFFF;
      --accent-peach: #FFAD8E;
      --accent-sage: #A8C5A0;
      --accent-butter: #FFD98E;
      --accent-lavender: #D4B8E0;
      --accent-sky: #A8D0E6;
      --accent-rose: #F4A0A0;
      --text-primary: #3D2C2C;
      --text-muted: #8B7676;
      --border: #F0E0D6;
      --shadow: 0 2px 8px rgba(61,44,44,0.08), 0 8px 24px rgba(61,44,44,0.06);
      --shadow-hover: 0 4px 12px rgba(61,44,44,0.12), 0 12px 32px rgba(61,44,44,0.1);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.6;
      overflow-x: hidden;
    }

    h1, h2, h3, h4 { font-family: 'Nunito', sans-serif; }

    /* ===== HERO ===== */
    .hero {
      text-align: center;
      padding: 48px 24px 32px;
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute;
      top: -60%;
      left: -20%;
      width: 140%;
      height: 200%;
      background: radial-gradient(ellipse at center top, rgba(255,173,142,0.2) 0%, transparent 60%);
      z-index: 0;
    }

    .hero-content { position: relative; z-index: 1; }

    .hero-emoji {
      font-size: 2.5rem;
      display: inline-block;
      animation: float 3s ease-in-out infinite;
    }

    .hero-name {
      font-family: 'Bubblegum Sans', cursive;
      font-size: clamp(2.5rem, 8vw, 4.5rem);
      color: var(--accent-peach);
      text-shadow: 2px 2px 0 rgba(255,173,142,0.3);
      margin: 8px 0 4px;
      letter-spacing: 1px;
    }

    .hero-subtitle {
      font-family: 'Nunito', sans-serif;
      font-size: clamp(1rem, 3vw, 1.3rem);
      color: var(--text-muted);
      font-weight: 600;
    }

    .hero-food-cluster {
      margin-top: 16px;
      font-size: 1.8rem;
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .hero-food-cluster span {
      display: inline-block;
      animation: gentle-bounce 2s ease-in-out infinite;
    }

    .hero-food-cluster span:nth-child(2) { animation-delay: 0.3s; }
    .hero-food-cluster span:nth-child(3) { animation-delay: 0.6s; }
    .hero-food-cluster span:nth-child(4) { animation-delay: 0.9s; }
    .hero-food-cluster span:nth-child(5) { animation-delay: 1.2s; }
    .hero-food-cluster span:nth-child(6) { animation-delay: 1.5s; }

    /* ===== DAY SELECTOR ===== */
    .day-selector-wrapper {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--bg-primary);
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
      transition: box-shadow 0.3s;
    }

    .day-selector-wrapper.scrolled {
      box-shadow: 0 2px 12px rgba(61,44,44,0.1);
    }

    .day-selector {
      display: flex;
      gap: 8px;
      padding: 0 16px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      justify-content: center;
    }

    .day-selector::-webkit-scrollbar { display: none; }

    .day-pill {
      flex-shrink: 0;
      border: 2px solid var(--border);
      background: var(--bg-card);
      border-radius: 24px;
      padding: 8px 16px;
      cursor: pointer;
      text-align: center;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      min-width: 90px;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .day-pill:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow);
    }

    .day-pill.active {
      border-color: transparent;
      color: white;
      transform: translateY(-2px);
      box-shadow: var(--shadow-hover);
    }

    .day-pill-name {
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .day-pill-theme {
      font-size: 0.65rem;
      opacity: 0.8;
      margin-top: 2px;
      white-space: nowrap;
    }

    /* ===== FLIP CARD ===== */
    .card-section {
      padding: 32px 16px;
      display: flex;
      justify-content: center;
    }

    .card-container {
      perspective: 1200px;
      width: 100%;
      max-width: 650px;
    }

    .card {
      position: relative;
      width: 100%;
      min-height: 500px;
      transform-style: preserve-3d;
      transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .card.flipped { transform: rotateY(180deg); }

    .card-face {
      position: absolute;
      width: 100%;
      min-height: 500px;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      border-radius: 24px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .card-front {
      background: var(--bg-card);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 32px;
      cursor: pointer;
      transition: box-shadow 0.3s;
    }

    .card-front:hover { box-shadow: var(--shadow-hover); }

    .card-front-emoji {
      font-size: 5rem;
      animation: float 3s ease-in-out infinite;
      margin-bottom: 24px;
    }

    .card-front-day {
      font-family: 'Nunito', sans-serif;
      font-size: clamp(1.8rem, 5vw, 2.5rem);
      font-weight: 800;
      margin-bottom: 8px;
    }

    .card-front-theme {
      font-size: clamp(1rem, 3vw, 1.2rem);
      color: var(--text-muted);
      font-weight: 600;
    }

    .card-front-hint {
      margin-top: 32px;
      font-size: 0.85rem;
      color: var(--text-muted);
      opacity: 0.6;
      animation: pulse 2s ease-in-out infinite;
    }

    .card-back {
      background: var(--bg-card);
      transform: rotateY(180deg);
      padding: 24px;
      cursor: pointer;
    }

    .card-back-header {
      text-align: center;
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 2px dashed var(--border);
    }

    .card-back-day {
      font-family: 'Nunito', sans-serif;
      font-size: 1.4rem;
      font-weight: 800;
    }

    .card-back-theme {
      font-size: 0.85rem;
      color: var(--text-muted);
      font-weight: 600;
    }

    .meal-row {
      display: flex;
      gap: 14px;
      padding: 14px 0;
      border-bottom: 1px solid var(--border);
      align-items: flex-start;
      opacity: 0;
      transform: translateX(-10px);
      animation: slideIn 0.4s ease-out forwards;
    }

    .meal-row:last-child { border-bottom: none; }

    .meal-icon {
      font-size: 1.6rem;
      flex-shrink: 0;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 12px;
      animation: gentle-bounce 2.5s ease-in-out infinite;
    }

    .meal-info { flex: 1; min-width: 0; }

    .meal-type {
      font-family: 'Nunito', sans-serif;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 2px;
    }

    .meal-dish {
      font-weight: 600;
      font-size: 0.95rem;
      margin-bottom: 4px;
      line-height: 1.4;
    }

    .meal-notes {
      font-size: 0.8rem;
      color: var(--text-muted);
      line-height: 1.5;
    }

    .card-back-hint {
      text-align: center;
      margin-top: 16px;
      font-size: 0.75rem;
      color: var(--text-muted);
      opacity: 0.5;
    }

    /* ===== NAVIGATION DOTS ===== */
    .nav-arrows {
      display: flex;
      justify-content: center;
      gap: 16px;
      padding: 0 16px 24px;
    }

    .nav-arrow {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 2px solid var(--border);
      background: var(--bg-card);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      transition: all 0.3s;
      -webkit-tap-highlight-color: transparent;
    }

    .nav-arrow:hover {
      background: var(--accent-peach);
      border-color: var(--accent-peach);
      color: white;
      transform: scale(1.1);
    }

    .nav-arrow:disabled {
      opacity: 0.3;
      cursor: not-allowed;
      transform: none;
    }

    /* ===== SECTIONS ===== */
    .section {
      max-width: 700px;
      margin: 0 auto;
      padding: 32px 16px;
    }

    .section-title {
      font-family: 'Nunito', sans-serif;
      font-size: clamp(1.4rem, 4vw, 1.8rem);
      font-weight: 800;
      text-align: center;
      margin-bottom: 24px;
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.6s ease-out;
    }

    .section-title.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* ===== KEY RULES BANNER ===== */
    .key-rules {
      background: linear-gradient(135deg, rgba(255,173,142,0.15), rgba(168,197,160,0.15));
      border-radius: 20px;
      padding: 24px;
      margin-bottom: 32px;
    }

    .key-rules-title {
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      font-size: 1.1rem;
      text-align: center;
      margin-bottom: 16px;
    }

    .key-rules-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 10px;
    }

    .key-rule {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
      padding: 8px 12px;
      background: var(--bg-card);
      border-radius: 12px;
      box-shadow: 0 1px 4px rgba(61,44,44,0.05);
    }

    .key-rule-icon { font-size: 1.1rem; flex-shrink: 0; }

    /* ===== INGREDIENTS ACCORDION ===== */
    .accordion-item {
      background: var(--bg-card);
      border-radius: 16px;
      margin-bottom: 12px;
      box-shadow: 0 1px 6px rgba(61,44,44,0.05);
      overflow: hidden;
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.5s ease-out, transform 0.5s ease-out;
    }

    .accordion-item.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .accordion-header {
      padding: 16px 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.2s;
    }

    .accordion-header:hover { background: rgba(255,173,142,0.06); }

    .accordion-arrow {
      transition: transform 0.3s;
      font-size: 0.8rem;
    }

    .accordion-item.open .accordion-arrow { transform: rotate(180deg); }

    .accordion-body {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.4s ease-out, padding 0.4s ease-out;
      padding: 0 20px;
    }

    .accordion-item.open .accordion-body {
      max-height: 600px;
      padding: 0 20px 20px;
    }

    .ingredient-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .ingredient-chip {
      background: var(--bg-primary);
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 0.82rem;
      line-height: 1.4;
      border: 1px solid var(--border);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .ingredient-chip:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow);
    }

    .ingredient-name {
      font-weight: 600;
      display: block;
    }

    .ingredient-benefit {
      color: var(--text-muted);
      font-size: 0.75rem;
    }

    /* ===== TIPS GRID ===== */
    .tips-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    @media (min-width: 600px) {
      .tips-grid { grid-template-columns: 1fr 1fr; }
    }

    .tip-card {
      background: var(--bg-card);
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 1px 6px rgba(61,44,44,0.05);
      display: flex;
      gap: 12px;
      align-items: flex-start;
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.5s ease-out;
    }

    .tip-card.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .tip-icon {
      font-size: 1.8rem;
      flex-shrink: 0;
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 14px;
      background: var(--bg-primary);
    }

    .tip-title {
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      margin-bottom: 4px;
    }

    .tip-detail {
      font-size: 0.82rem;
      color: var(--text-muted);
      line-height: 1.5;
    }

    /* ===== FOOTER ===== */
    .footer {
      text-align: center;
      padding: 32px 16px;
      color: var(--text-muted);
      font-size: 0.8rem;
    }

    .footer-heart { color: var(--accent-peach); }

    /* ===== SECTION NAV ===== */
    .section-nav {
      display: flex;
      justify-content: center;
      gap: 12px;
      padding: 0 16px 16px;
      flex-wrap: wrap;
    }

    .section-nav-btn {
      background: var(--bg-card);
      border: 1.5px solid var(--border);
      border-radius: 20px;
      padding: 8px 18px;
      font-family: 'Nunito', sans-serif;
      font-weight: 600;
      font-size: 0.82rem;
      cursor: pointer;
      transition: all 0.3s;
      color: var(--text-primary);
      -webkit-tap-highlight-color: transparent;
    }

    .section-nav-btn:hover {
      background: var(--accent-peach);
      color: white;
      border-color: var(--accent-peach);
      transform: translateY(-1px);
    }

    /* ===== ANIMATIONS ===== */
    @keyframes gentle-bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      25% { transform: translateY(-8px) rotate(-3deg); }
      75% { transform: translateY(-4px) rotate(3deg); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 0.8; }
    }

    @keyframes slideIn {
      to { opacity: 1; transform: translateX(0); }
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 480px) {
      .day-pill { min-width: 76px; padding: 6px 12px; }
      .day-pill-name { font-size: 0.75rem; }
      .card-front { padding: 36px 24px; }
      .card-front-emoji { font-size: 4rem; }
      .card-back { padding: 18px; }
      .meal-row { gap: 10px; padding: 12px 0; }
      .meal-icon { width: 34px; height: 34px; font-size: 1.3rem; }
      .key-rules-grid { grid-template-columns: 1fr; }
    }

    @media (min-width: 768px) {
      .day-selector { justify-content: center; gap: 10px; }
      .day-pill { min-width: 100px; }
    }

    @media (min-width: 1024px) {
      .card-section { padding: 40px 24px; }
      .section { padding: 48px 24px; }
    }
  </style>
</head>

  <!-- HERO -->

      <div class="hero-emoji">🍼</div>
      <h1 class="hero-name">Aaradhya</h1>
      <p class="hero-subtitle">Weekly Meal Plan</p>
      <div class="hero-food-cluster">
        <span>🥣</span><span>🧀</span><span>🍛</span><span>🥒</span><span>🍌</span><span>🧈</span>

  <!-- SECTION NAV -->
  <nav class="section-nav">
    <button class="section-nav-btn" onclick="document.getElementById('meals').scrollIntoView({behavior:'smooth'})">Meals</button>
    <button class="section-nav-btn" onclick="document.getElementById('ingredients').scrollIntoView({behavior:'smooth'})">New Ingredients</button>
    <button class="section-nav-btn" onclick="document.getElementById('tips').scrollIntoView({behavior:'smooth'})">Weight Tips</button>
  </nav>

  <!-- DAY SELECTOR -->
  <div class="day-selector-wrapper" id="daySelectorWrapper">

  <main class="card-section" id="meals">

        <div class="card-face card-front" id="cardFront"></div>
        <div class="card-face card-back" id="cardBack"></div>
      </div>
    </div>
  </main>

  <!-- NAV ARROWS -->
  <div class="nav-arrows">
    <button class="nav-arrow" id="prevDay" aria-label="Previous day">&#8592;</button>
    <button class="nav-arrow" id="nextDay" aria-label="Next day">&#8594;</button>
  </div>

  <!-- KEY RULES -->
  <section class="section" id="rules">
    <div class="key-rules">
      <div class="key-rules-title">Key Rules</div>
      <div class="key-rules-grid" id="keyRulesGrid"></div>
    </div>
  </section>

  <!-- NEW INGREDIENTS -->
  <section class="section" id="ingredients">
    <h2 class="section-title">New Ingredients to Introduce</h2>
    <div id="accordionContainer"></div>
  </section>

  <!-- WEIGHT GAIN TIPS -->
  <section class="section" id="tips">
    <h2 class="section-title">Weight Gain Priorities</h2>
    <div class="tips-grid" id="tipsGrid"></div>
  </section>

  <!-- FOOTER -->
  <footer class="footer">
    Made with <span class="footer-heart">&#10084;</span> for Aaradhya
  </footer>

  { icon: "🌿", text: "No non-veg on Tuesday & Thursday" },
  { icon: "🍗", text: "Chicken on other days selectively" },

/* ===== STATE ===== */
let currentDay = 0;
let isFlipped = false;

/* ===== RENDER ===== */
function renderDaySelector() {
  const container = document.getElementById('daySelector');
  container.innerHTML = DAYS.map((day, i) => `
    <button class="day-pill ${i === 0 ? 'active' : ''}" data-index="${i}" style="${i === 0 ? `background:${day.color};border-color:${day.color};color:#fff` : ''}">
      <div class="day-pill-name">${day.name.slice(0, 3)}</div>
      <div class="day-pill-theme">${day.theme}</div>
    </button>
  `).join('');

  container.addEventListener('click', (e) => {
    const pill = e.target.closest('.day-pill');
    if (!pill) return;
    const idx = parseInt(pill.dataset.index);
    if (idx !== currentDay) switchDay(idx);
  });
}

function renderCardFront(dayIndex) {
  const day = DAYS[dayIndex];
  document.getElementById('cardFront').innerHTML = `
    <div class="card-front-emoji">${day.emoji}</div>
    <div class="card-front-day" style="color:${day.color}">${day.name}</div>
    <div class="card-front-theme">${day.theme}</div>
    <div class="card-front-hint">Tap to see meals</div>
  `;
}

function renderCardBack(dayIndex) {
  const day = DAYS[dayIndex];
  const mealColors = [day.color, '#D4B8E0', day.color, '#FFD98E', day.color];
  document.getElementById('cardBack').innerHTML = `
    <div class="card-back-header">
      <div class="card-back-day" style="color:${day.color}">${day.name}</div>
      <div class="card-back-theme">${day.theme}</div>
    </div>
    ${day.meals.map((meal, i) => `
      <div class="meal-row" style="animation-delay:${i * 0.1}s">
        <div class="meal-icon" style="background:${mealColors[i]}20;animation-delay:${i * 0.4}s">${meal.icon}</div>
        <div class="meal-info">
          <div class="meal-type" style="color:${mealColors[i]}">${meal.type}</div>
          <div class="meal-dish">${meal.dish}</div>
          <div class="meal-notes">${meal.notes}</div>
        </div>
      </div>
    `).join('')}
    <div class="card-back-hint">Tap to flip back</div>
  `;
}

function renderKeyRules() {
  document.getElementById('keyRulesGrid').innerHTML = KEY_RULES.map(rule => `
    <div class="key-rule">
      <span class="key-rule-icon">${rule.icon}</span>
      <span>${rule.text}</span>
    </div>
  `).join('');
}

function renderIngredients() {
  const container = document.getElementById('accordionContainer');
  container.innerHTML = Object.entries(NEW_INGREDIENTS).map(([category, data], idx) => `
    <div class="accordion-item" style="transition-delay:${idx * 0.1}s">
      <div class="accordion-header" onclick="toggleAccordion(this)">
        <span>${data.icon} ${category}</span>
        <span class="accordion-arrow">&#9660;</span>
      </div>
      <div class="accordion-body">
        <div class="ingredient-chips">
          ${data.items.map(item => `
            <div class="ingredient-chip">
              <span class="ingredient-name">${item.name}</span>
              <span class="ingredient-benefit">${item.benefit}</span>
            </div>
          `).join('')}
        </div>
      </div>
    </div>
  `).join('');
}

function renderTips() {
  document.getElementById('tipsGrid').innerHTML = WEIGHT_GAIN_TIPS.map((tip, i) => `
    <div class="tip-card" style="transition-delay:${i * 0.1}s">
      <div class="tip-icon">${tip.icon}</div>
      <div>
        <div class="tip-title">${tip.title}</div>
        <div class="tip-detail">${tip.detail}</div>
      </div>
    </div>
  `).join('');
}

/* ===== INTERACTIONS ===== */
function switchDay(newIndex) {
  const card = document.getElementById('mealCard');

  // Unflip first if flipped
  if (isFlipped) {
    card.classList.remove('flipped');
    isFlipped = false;
  }

  // Animate out
  card.style.transition = 'transform 0.35s ease-in, opacity 0.35s';
  card.style.transform = 'scale(0.9) rotateY(20deg)';
  card.style.opacity = '0';

  setTimeout(() => {
    currentDay = newIndex;
    renderCardFront(currentDay);
    renderCardBack(currentDay);
    updateActivePill();
    updateArrows();

    // Animate in
    card.style.transform = 'scale(0.9) rotateY(-20deg)';
    requestAnimationFrame(() => {
      card.style.transition = 'transform 0.4s cubic-bezier(0.4,0,0.2,1), opacity 0.4s';
      card.style.transform = 'scale(1) rotateY(0deg)';
      card.style.opacity = '1';
    });
  }, 350);

  // Scroll pill into view
  const pills = document.querySelectorAll('.day-pill');
  pills[newIndex]?.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
}

function toggleFlip() {
  const card = document.getElementById('mealCard');
  isFlipped = !isFlipped;
  card.classList.toggle('flipped');

  // Update card min-height based on content
  if (isFlipped) {
    const backContent = document.getElementById('cardBack');
    const height = Math.max(500, backContent.scrollHeight);
    card.style.minHeight = height + 'px';
    document.querySelectorAll('.card-face').forEach(f => f.style.minHeight = height + 'px');
  }
}

function updateActivePill() {
  document.querySelectorAll('.day-pill').forEach((pill, i) => {
    if (i === currentDay) {
      pill.classList.add('active');
      pill.style.background = DAYS[i].color;
      pill.style.borderColor = DAYS[i].color;
      pill.style.color = '#fff';
    } else {
      pill.classList.remove('active');
      pill.style.background = '';
      pill.style.borderColor = '';
      pill.style.color = '';
    }
  });
}

function updateArrows() {
  document.getElementById('prevDay').disabled = currentDay === 0;
  document.getElementById('nextDay').disabled = currentDay === DAYS.length - 1;
}

function toggleAccordion(header) {
  const item = header.parentElement;
  item.classList.toggle('open');
}

/* ===== SCROLL ANIMATIONS ===== */
function initScrollAnimations() {
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
      }
    });
  }, { threshold: 0.1, rootMargin: '0px 0px -40px 0px' });

  document.querySelectorAll('.section-title, .accordion-item, .tip-card').forEach(el => {
    observer.observe(el);
  });

  // Sticky shadow
  const stickyObserver = new IntersectionObserver(([entry]) => {
    document.getElementById('daySelectorWrapper').classList.toggle('scrolled', !entry.isIntersecting);
  }, { threshold: 0 });
  stickyObserver.observe(document.querySelector('.hero'));
}

/* ===== EVENTS ===== */
document.getElementById('mealCard').addEventListener('click', toggleFlip);
document.getElementById('prevDay').addEventListener('click', () => { if (currentDay > 0) switchDay(currentDay - 1); });
document.getElementById('nextDay').addEventListener('click', () => { if (currentDay < DAYS.length - 1) switchDay(currentDay + 1); });

// Keyboard navigation
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowLeft' && currentDay > 0) switchDay(currentDay - 1);
  if (e.key === 'ArrowRight' && currentDay < DAYS.length - 1) switchDay(currentDay + 1);
  if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); toggleFlip(); }
});

// Swipe support
let touchStartX = 0;
let touchEndX = 0;
const cardEl = document.getElementById('mealCard');

cardEl.addEventListener('touchstart', (e) => { touchStartX = e.changedTouches[0].screenX; }, { passive: true });
cardEl.addEventListener('touchend', (e) => {
  touchEndX = e.changedTouches[0].screenX;
  const diff = touchStartX - touchEndX;
  if (Math.abs(diff) > 60) {
    if (diff > 0 && currentDay < DAYS.length - 1) switchDay(currentDay + 1);
    else if (diff < 0 && currentDay > 0) switchDay(currentDay - 1);
  }
});

/* ===== INIT ===== */
function init() {
  renderDaySelector();
  renderCardFront(0);
  renderCardBack(0);
  renderKeyRules();
  renderIngredients();
  renderTips();
  updateArrows();

  requestAnimationFrame(() => {
    initScrollAnimations();
  });
}

document.addEventListener('DOMContentLoaded', init);
</script>
