<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aaradhya's Weekly Meal Plan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bubblegum+Sans&family=Nunito:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-primary: #1a1028;
      --bg-card: rgba(255,255,255,0.07);
      --accent-pink: #FF7EB3;
      --accent-green: #7EE8A8;
      --accent-yellow: #FFD66B;
      --accent-purple: #C084FC;
      --accent-cyan: #67E8F9;
      --accent-rose: #FB7185;
      --text-primary: #F8F0FF;
      --text-muted: #B8A0CC;
      --border: rgba(255,255,255,0.1);
      --glow-pink: rgba(255,126,179,0.35);
      --glow-purple: rgba(192,132,252,0.3);
      --glow-cyan: rgba(103,232,249,0.2);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.6;
      overflow-x: hidden;
      min-height: 100vh;
      cursor: none;
    }

    h1, h2, h3, h4 { font-family: 'Nunito', sans-serif; }

    /* ===== ANIMATED BACKGROUND ===== */
    .bg-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .bg-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.5;
      animation: orbFloat 20s ease-in-out infinite;
    }

    .bg-orb:nth-child(1) {
      width: 400px; height: 400px;
      background: var(--glow-pink);
      top: -10%; left: -10%;
      animation-duration: 25s;
    }
    .bg-orb:nth-child(2) {
      width: 350px; height: 350px;
      background: var(--glow-purple);
      top: 40%; right: -10%;
      animation-duration: 20s;
      animation-delay: -5s;
    }
    .bg-orb:nth-child(3) {
      width: 300px; height: 300px;
      background: var(--glow-cyan);
      bottom: -5%; left: 30%;
      animation-duration: 22s;
      animation-delay: -10s;
    }

    .sparkle {
      position: absolute;
      width: 4px; height: 4px;
      background: white;
      border-radius: 50%;
      animation: sparkle 3s ease-in-out infinite;
    }

    /* ===== BABY CHASER ===== */
    .baby-chaser {
      position: fixed;
      z-index: 9999;
      font-size: 2.4rem;
      pointer-events: none;
      filter: drop-shadow(0 0 14px rgba(255,126,179,0.7));
      will-change: left, top;
    }

    .baby-trail {
      position: fixed;
      font-size: 0.9rem;
      pointer-events: none;
      z-index: 9998;
      opacity: 0;
      animation: trailFade 0.8s ease-out forwards;
    }

    /* ===== HERO ===== */
    .hero {
      text-align: center;
      padding: 36px 16px 20px;
      position: relative;
      z-index: 1;
    }

    .hero-emoji {
      font-size: 2.2rem;
      display: inline-block;
      animation: float 3s ease-in-out infinite;
      filter: drop-shadow(0 0 10px rgba(255,214,107,0.5));
    }

    .hero-name {
      font-family: 'Bubblegum Sans', cursive;
      font-size: clamp(3rem, 12vw, 5.5rem);
      background: linear-gradient(135deg, #FF7EB3, #FFD66B, #67E8F9, #C084FC, #FF7EB3);
      background-size: 400% 400%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradientShift 4s ease-in-out infinite;
      margin: 0;
      letter-spacing: 2px;
      line-height: 1.1;
    }

    .hero-subtitle {
      font-family: 'Nunito', sans-serif;
      font-size: clamp(0.85rem, 2.5vw, 1.1rem);
      color: var(--text-muted);
      font-weight: 600;
      margin-top: 4px;
    }

    .hero-food-cluster {
      margin-top: 10px;
      font-size: 1.4rem;
      display: flex;
      justify-content: center;
      gap: 8px;
    }

    .hero-food-cluster span {
      display: inline-block;
      animation: gentle-bounce 2s ease-in-out infinite;
      filter: drop-shadow(0 0 6px rgba(255,255,255,0.3));
    }

    .hero-food-cluster span:nth-child(2) { animation-delay: 0.25s; }
    .hero-food-cluster span:nth-child(3) { animation-delay: 0.5s; }
    .hero-food-cluster span:nth-child(4) { animation-delay: 0.75s; }
    .hero-food-cluster span:nth-child(5) { animation-delay: 1s; }
    .hero-food-cluster span:nth-child(6) { animation-delay: 1.25s; }

    /* ===== DAY SELECTOR ===== */
    .day-selector-wrapper {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(26,16,40,0.88);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
      transition: box-shadow 0.3s;
    }

    .day-selector-wrapper.scrolled {
      box-shadow: 0 4px 30px rgba(0,0,0,0.5);
    }

    .day-selector {
      display: flex;
      gap: 5px;
      padding: 0 6px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }

    .day-selector::-webkit-scrollbar { display: none; }

    .day-pill {
      flex: 1;
      min-width: 0;
      border: 1.5px solid var(--border);
      background: var(--bg-card);
      border-radius: 14px;
      padding: 7px 3px;
      cursor: pointer;
      text-align: center;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .day-pill:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 20px rgba(192,132,252,0.25);
    }

    .day-pill.active {
      border-color: transparent;
      transform: translateY(-2px);
    }

    .day-pill-name {
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      font-size: clamp(0.6rem, 2.2vw, 0.82rem);
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .day-pill-theme {
      font-size: clamp(0.45rem, 1.4vw, 0.6rem);
      opacity: 0.7;
      margin-top: 1px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ===== FLIP CARD ===== */
    .card-section {
      padding: 16px 8px;
      display: flex;
      justify-content: center;
      position: relative;
      z-index: 1;
    }

    .card-container {
      perspective: 1200px;
      width: 100%;
      max-width: 800px;
    }

    .card {
      position: relative;
      width: 100%;
      min-height: 440px;
      transform-style: preserve-3d;
      transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .card.flipped { transform: rotateY(180deg); }

    .card-face {
      position: absolute;
      width: 100%;
      min-height: 440px;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    .card-front {
      background: linear-gradient(145deg, rgba(255,255,255,0.1), rgba(255,255,255,0.02));
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 36px 20px;
      cursor: pointer;
      transition: box-shadow 0.3s, border-color 0.3s;
    }

    .card-front:hover {
      box-shadow: 0 8px 40px rgba(0,0,0,0.4), 0 0 60px var(--glow-pink);
      border-color: rgba(255,126,179,0.3);
    }

    .card-front-emoji {
      font-size: 4rem;
      animation: float 3s ease-in-out infinite;
      margin-bottom: 16px;
      filter: drop-shadow(0 0 20px rgba(255,255,255,0.3));
    }

    .card-front-day {
      font-family: 'Nunito', sans-serif;
      font-size: clamp(2rem, 7vw, 3rem);
      font-weight: 800;
      margin-bottom: 4px;
      text-shadow: 0 0 30px currentColor;
    }

    .card-front-theme {
      font-size: clamp(0.95rem, 3vw, 1.2rem);
      color: var(--text-muted);
      font-weight: 600;
    }

    .card-front-hint {
      margin-top: 24px;
      font-size: 0.8rem;
      color: var(--text-muted);
      opacity: 0.4;
      animation: pulse 2s ease-in-out infinite;
    }

    .card-back {
      background: linear-gradient(145deg, rgba(255,255,255,0.1), rgba(255,255,255,0.02));
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      transform: rotateY(180deg);
      padding: 18px 14px;
      cursor: pointer;
    }

    .card-back-header {
      text-align: center;
      margin-bottom: 12px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }

    .card-back-day {
      font-family: 'Nunito', sans-serif;
      font-size: 1.2rem;
      font-weight: 800;
      text-shadow: 0 0 20px currentColor;
    }

    .card-back-theme {
      font-size: 0.75rem;
      color: var(--text-muted);
      font-weight: 600;
    }

    .meal-row {
      display: flex;
      gap: 10px;
      padding: 10px 8px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      align-items: flex-start;
      opacity: 0;
      transform: translateX(-10px);
      animation: slideIn 0.4s ease-out forwards;
      border-radius: 10px;
      transition: background 0.2s;
    }

    .meal-row:hover { background: rgba(255,255,255,0.04); }
    .meal-row:last-of-type { border-bottom: none; }

    .meal-icon {
      font-size: 1.3rem;
      flex-shrink: 0;
      width: 34px;
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 10px;
      animation: gentle-bounce 2.5s ease-in-out infinite;
    }

    .meal-info { flex: 1; min-width: 0; }

    .meal-type {
      font-family: 'Nunito', sans-serif;
      font-size: 0.6rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 1px;
    }

    .meal-dish {
      font-weight: 600;
      font-size: 0.85rem;
      margin-bottom: 2px;
      line-height: 1.3;
    }

    .meal-notes {
      font-size: 0.72rem;
      color: var(--text-muted);
      line-height: 1.4;
    }

    .card-back-hint {
      text-align: center;
      margin-top: 10px;
      font-size: 0.65rem;
      color: var(--text-muted);
      opacity: 0.35;
    }

    /* ===== NAV ARROWS ===== */
    .nav-arrows {
      display: flex;
      justify-content: center;
      gap: 16px;
      padding: 4px 16px 24px;
      position: relative;
      z-index: 1;
    }

    .nav-arrow {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      background: var(--bg-card);
      backdrop-filter: blur(10px);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      color: var(--text-primary);
      transition: all 0.3s;
      -webkit-tap-highlight-color: transparent;
    }

    .nav-arrow:hover {
      background: var(--accent-pink);
      border-color: var(--accent-pink);
      color: #1a1028;
      transform: scale(1.15);
      box-shadow: 0 0 24px var(--glow-pink);
    }

    .nav-arrow:disabled {
      opacity: 0.15;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    /* ===== FOOTER ===== */
    .footer {
      text-align: center;
      padding: 24px 16px;
      color: var(--text-muted);
      font-size: 0.75rem;
      position: relative;
      z-index: 1;
    }

    .footer-heart { color: var(--accent-pink); }

    /* ===== ANIMATIONS ===== */
    @keyframes gentle-bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      25% { transform: translateY(-8px) rotate(-3deg); }
      75% { transform: translateY(-4px) rotate(3deg); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.7; }
    }

    @keyframes slideIn {
      to { opacity: 1; transform: translateX(0); }
    }

    @keyframes orbFloat {
      0%, 100% { transform: translate(0, 0) scale(1); }
      25% { transform: translate(60px, -40px) scale(1.1); }
      50% { transform: translate(-30px, 50px) scale(0.9); }
      75% { transform: translate(-50px, -25px) scale(1.05); }
    }

    @keyframes sparkle {
      0%, 100% { opacity: 0; transform: scale(0); }
      50% { opacity: 0.8; transform: scale(1); }
    }

    @keyframes gradientShift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    @keyframes trailFade {
      0% { opacity: 0.7; transform: scale(1); }
      100% { opacity: 0; transform: scale(0.2) translateY(-15px); }
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 480px) {
      .hero { padding: 24px 10px 14px; }
      .hero-food-cluster { font-size: 1.2rem; gap: 6px; }
      .card-section { padding: 12px 6px; }
      .card-front { padding: 28px 14px; }
      .card-front-emoji { font-size: 3.2rem; }
      .card-back { padding: 14px 10px; }
      .meal-row { gap: 8px; padding: 8px 6px; }
      .meal-icon { width: 30px; height: 30px; font-size: 1.1rem; }
      .meal-dish { font-size: 0.82rem; }
      .meal-notes { font-size: 0.68rem; }
      .nav-arrow { width: 40px; height: 40px; font-size: 1rem; }
      .baby-chaser { font-size: 1.8rem; }
    }

    @media (min-width: 768px) {
      .day-selector { gap: 8px; padding: 0 12px; }
      .card-section { padding: 20px 16px; }
    }

    @media (min-width: 1024px) {
      .card-container { max-width: 700px; }
    }

    /* Hide custom cursor on touch devices */
    @media (hover: none) {
      body { cursor: auto; }
      .baby-chaser { display: none; }
    }
  </style>
</head>

      { type: "Snack 1", icon: "\u{1F952}", dish: "Steamed zucchini + paneer", notes: "Finger food combination" },
      { type: "Lunch", icon: "\u{1F357}", dish: "Chicken, Beetroot & Potato Mash", notes: "Introduce beetroot here \u2014 iron-rich, pretty, and the potato balances the taste" },
      { type: "Snack 2", icon: "\u{1F963}", dish: "Sattu porridge (savory)", notes: "Protein-rich afternoon boost" },
      { type: "Dinner", icon: "\u{1F35B}", dish: "Paneer Khichdi (simple)", notes: "End the week with a familiar, comforting meal" }
    ]
  }
];

/* ===== STATE ===== */
let currentDay = 0;
let isFlipped = false;
let isAnimating = false;
let isSwiping = false;

/* ===== BABY CHASER ===== */
const baby = document.getElementById('babyChaser');
let babyX = window.innerWidth / 2, babyY = window.innerHeight / 2;
let mouseX = babyX, mouseY = babyY;
let trailCounter = 0;
const trailEmojis = ['\u2728', '\u{1F31F}', '\u{1F4AB}', '\u2B50'];

function updateBaby() {
  const dx = mouseX - babyX;
  const dy = mouseY - babyY;
  const dist = Math.sqrt(dx * dx + dy * dy);

  babyX += dx * 0.045;
  babyY += dy * 0.045;

  const scaleX = dx < 0 ? -1 : 1;
  baby.style.left = (babyX - 20) + 'px';
  baby.style.top = (babyY - 20) + 'px';
  baby.style.transform = 'scaleX(' + scaleX + ')';

  trailCounter++;
  if (trailCounter % 10 === 0 && dist > 15) {
    const trail = document.createElement('div');
    trail.className = 'baby-trail';
    trail.textContent = trailEmojis[Math.floor(Math.random() * trailEmojis.length)];
    trail.style.left = babyX + 'px';
    trail.style.top = babyY + 'px';
    document.body.appendChild(trail);
    setTimeout(() => trail.remove(), 800);
  }

  requestAnimationFrame(updateBaby);
}

document.addEventListener('mousemove', (e) => {
  mouseX = e.clientX;
  mouseY = e.clientY;
});

requestAnimationFrame(updateBaby);

/* ===== SPARKLES ===== */
(function createSparkles() {
  const canvas = document.getElementById('bgCanvas');
  for (let i = 0; i < 25; i++) {
    const s = document.createElement('div');
    s.className = 'sparkle';
    s.style.left = Math.random() * 100 + '%';
    s.style.top = Math.random() * 100 + '%';
    s.style.animationDelay = (Math.random() * 3) + 's';
    s.style.animationDuration = (2 + Math.random() * 2) + 's';
    canvas.appendChild(s);
  }
})();

/* ===== RENDER ===== */
function renderDaySelector() {
  const container = document.getElementById('daySelector');
  container.innerHTML = DAYS.map((day, i) =>
    '<button class="day-pill' + (i === 0 ? ' active' : '') + '" data-index="' + i + '" style="' + (i === 0 ? 'background:' + day.color + ';border-color:' + day.color + ';color:#1a1028' : '') + '">' +
      '<div class="day-pill-name">' + day.name.slice(0, 3) + '</div>' +
      '<div class="day-pill-theme">' + day.theme + '</div>' +
    '</button>'
  ).join('');

  container.addEventListener('click', function(e) {
    var pill = e.target.closest('.day-pill');
    if (!pill) return;
    var idx = parseInt(pill.dataset.index);
    if (idx !== currentDay) switchDay(idx);
  });
}

function renderCardFront(dayIndex) {
  var day = DAYS[dayIndex];
  document.getElementById('cardFront').innerHTML =
    '<div class="card-front-emoji">' + day.emoji + '</div>' +
    '<div class="card-front-day" style="color:' + day.color + '">' + day.name + '</div>' +
    '<div class="card-front-theme">' + day.theme + '</div>' +
    '<div class="card-front-hint">Tap to see meals</div>';
}

function renderCardBack(dayIndex) {
  var day = DAYS[dayIndex];
  var mc = [day.color, '#C084FC', day.color, '#FFD66B', day.color];
  var html = '<div class="card-back-header">' +
    '<div class="card-back-day" style="color:' + day.color + '">' + day.name + '</div>' +
    '<div class="card-back-theme">' + day.theme + '</div></div>';
  day.meals.forEach(function(meal, i) {
    html += '<div class="meal-row" style="animation-delay:' + (i * 0.1) + 's">' +
      '<div class="meal-icon" style="background:' + mc[i] + '20;animation-delay:' + (i * 0.4) + 's">' + meal.icon + '</div>' +
      '<div class="meal-info">' +
        '<div class="meal-type" style="color:' + mc[i] + '">' + meal.type + '</div>' +
        '<div class="meal-dish">' + meal.dish + '</div>' +
        '<div class="meal-notes">' + meal.notes + '</div>' +
      '</div></div>';
  });
  html += '<div class="card-back-hint">Tap to flip back</div>';
  document.getElementById('cardBack').innerHTML = html;
}

/* ===== INTERACTIONS ===== */
function switchDay(newIndex) {
  if (isAnimating || newIndex === currentDay) return;
  isAnimating = true;

  var card = document.getElementById('mealCard');

  if (isFlipped) {
    card.style.transition = 'none';
    card.classList.remove('flipped');
    isFlipped = false;
    card.style.minHeight = '';
    document.querySelectorAll('.card-face').forEach(function(f) { f.style.minHeight = ''; });
    card.offsetHeight;
  }

  card.style.transition = 'transform 0.35s ease-in, opacity 0.35s';
  card.style.transform = 'scale(0.9) rotateY(20deg)';
  card.style.opacity = '0';

  setTimeout(function() {
    currentDay = newIndex;
    renderCardFront(currentDay);
    renderCardBack(currentDay);
    updateActivePill();
    updateArrows();

    card.style.transform = 'scale(0.9) rotateY(-20deg)';
    requestAnimationFrame(function() {
      card.style.transition = 'transform 0.4s cubic-bezier(0.4,0,0.2,1), opacity 0.4s';
      card.style.transform = 'scale(1) rotateY(0deg)';
      card.style.opacity = '1';

      setTimeout(function() {
        card.style.transition = '';
        card.style.transform = '';
        card.style.opacity = '';
        isAnimating = false;
      }, 400);
    });
  }, 350);

  var pills = document.querySelectorAll('.day-pill');
  if (pills[newIndex]) pills[newIndex].scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
}

function toggleFlip() {
  if (isAnimating) return;

  var card = document.getElementById('mealCard');
  card.style.transition = '';
  isFlipped = !isFlipped;
  card.classList.toggle('flipped');

  if (isFlipped) {
    requestAnimationFrame(function() {
      var backContent = document.getElementById('cardBack');
      var height = Math.max(440, backContent.scrollHeight);
      card.style.minHeight = height + 'px';
      document.querySelectorAll('.card-face').forEach(function(f) { f.style.minHeight = height + 'px'; });
    });
  } else {
    setTimeout(function() {
      card.style.minHeight = '';
      document.querySelectorAll('.card-face').forEach(function(f) { f.style.minHeight = ''; });
    }, 700);
  }
}

function updateActivePill() {
  document.querySelectorAll('.day-pill').forEach(function(pill, i) {
    if (i === currentDay) {
      pill.classList.add('active');
      pill.style.background = DAYS[i].color;
      pill.style.borderColor = DAYS[i].color;
      pill.style.color = '#1a1028';
    } else {
      pill.classList.remove('active');
      pill.style.background = '';
      pill.style.borderColor = '';
      pill.style.color = '';
    }
  });
}

function updateArrows() {
  document.getElementById('prevDay').disabled = currentDay === 0;
  document.getElementById('nextDay').disabled = currentDay === DAYS.length - 1;
}

/* ===== SCROLL ANIMATIONS ===== */
function initScrollAnimations() {
  var stickyObserver = new IntersectionObserver(function(entries) {
    document.getElementById('daySelectorWrapper').classList.toggle('scrolled', !entries[0].isIntersecting);
  }, { threshold: 0 });
  stickyObserver.observe(document.querySelector('.hero'));
}

/* ===== EVENTS ===== */
document.getElementById('mealCard').addEventListener('click', function() {
  if (isSwiping) { isSwiping = false; return; }
  toggleFlip();
});
document.getElementById('prevDay').addEventListener('click', function() { if (currentDay > 0) switchDay(currentDay - 1); });
document.getElementById('nextDay').addEventListener('click', function() { if (currentDay < DAYS.length - 1) switchDay(currentDay + 1); });

document.addEventListener('keydown', function(e) {
  var active = document.activeElement;
  var isOnInteractive = active && (active.tagName === 'BUTTON' || active.tagName === 'A' || active.tagName === 'INPUT');
  if (e.key === 'ArrowLeft' && currentDay > 0) switchDay(currentDay - 1);
  if (e.key === 'ArrowRight' && currentDay < DAYS.length - 1) switchDay(currentDay + 1);
  if ((e.key === ' ' || e.key === 'Enter') && !isOnInteractive) { e.preventDefault(); toggleFlip(); }
});

var touchStartX = 0;
var cardEl = document.getElementById('mealCard');

cardEl.addEventListener('touchstart', function(e) {
  touchStartX = e.changedTouches[0].screenX;
  isSwiping = false;
}, { passive: true });

cardEl.addEventListener('touchend', function(e) {
  var diff = touchStartX - e.changedTouches[0].screenX;
  if (Math.abs(diff) > 60) {
    isSwiping = true;
    if (diff > 0 && currentDay < DAYS.length - 1) switchDay(currentDay + 1);
    else if (diff < 0 && currentDay > 0) switchDay(currentDay - 1);
  }
});

/* ===== INIT ===== */
function init() {
  renderDaySelector();
  renderCardFront(0);
  renderCardBack(0);
  updateArrows();
  requestAnimationFrame(initScrollAnimations);
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
